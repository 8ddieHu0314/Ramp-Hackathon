<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject }}</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.7;
    color: #1a1a1a;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    background-color: #f0f2f5;
  }
  .container {
    background-color: #ffffff;
    border-radius: 12px;
    padding: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    padding: 28px 32px;
    color: #ffffff;
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
  }
  .header .date {
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    margin-top: 4px;
  }
  .body-content {
    padding: 28px 32px;
  }

  /* Section styles */
  .section {
    margin-bottom: 28px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-body {
    padding: 16px;
  }

  /* Section color variants */
  .section-alert .section-header { background-color: #fef3c7; color: #92400e; }
  .section-summary .section-header { background-color: #ede9fe; color: #5b21b6; }
  .section-website .section-header { background-color: #dbeafe; color: #1e40af; }
  .section-docs .section-header { background-color: #d1fae5; color: #065f46; }
  .section-github .section-header { background-color: #f3f4f6; color: #1f2937; }
  .section-trends .section-header { background-color: #fce7f3; color: #9d174d; }
  .section-strategy .section-header { background-color: #fee2e2; color: #991b1b; }

  h2 {
    font-size: 16px;
    margin: 0;
    padding: 0;
    border: none;
    color: inherit;
  }
  h3 {
    color: #374151;
    font-size: 14px;
    font-weight: 600;
    margin-top: 16px;
    margin-bottom: 6px;
  }
  h3:first-child {
    margin-top: 0;
  }
  p {
    margin: 8px 0;
    font-size: 14px;
  }
  ul, ol {
    padding-left: 20px;
    margin: 8px 0;
  }
  li {
    margin-bottom: 8px;
    font-size: 14px;
  }
  a {
    color: #2563eb;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }

  /* Priority tags */
  .tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    vertical-align: middle;
    margin-right: 4px;
  }
  .tag-high {
    background-color: #fee2e2;
    color: #dc2626;
    border: 1px solid #fca5a5;
  }
  .tag-med {
    background-color: #fef3c7;
    color: #d97706;
    border: 1px solid #fcd34d;
  }
  .tag-low {
    background-color: #d1fae5;
    color: #059669;
    border: 1px solid #6ee7b7;
  }

  /* Code and diffs */
  code {
    background-color: #f3f4f6;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  }
  pre {
    background-color: #1e293b;
    color: #e2e8f0;
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
    font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
  }
  pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  blockquote {
    border-left: 3px solid #3b82f6;
    margin: 12px 0;
    padding: 8px 16px;
    background-color: #f8fafc;
    border-radius: 0 6px 6px 0;
    color: #475569;
    font-size: 14px;
  }
  .footer {
    padding: 20px 32px;
    border-top: 1px solid #e5e7eb;
    font-size: 12px;
    color: #9ca3af;
    text-align: center;
    background-color: #f9fafb;
  }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 8px; }
    .header { padding: 20px; }
    .body-content { padding: 16px; }
    .section-body { padding: 12px; }
    .footer { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>{{ subject }}</h1>
    <div class="date">{{ day_of_week }}</div>
  </div>

  <div class="body-content">
    {{ report_html }}
  </div>

  <div class="footer">
    Generated by CompetitorIQ &bull; {{ date }}
  </div>
</div>
</body>
</html>
